training:
  seed: 7
  generator: transformer
  baseline_generator: rnn
  pretraining:
    load_checkpoint: false
    checkpoint: artifacts/checkpoints/synthetic_prior_transformer.pt
    synthetic_examples: 128
    synthetic_epochs: 3
    synthetic_length: 96
  curriculum:
    enabled: true
    initial_max_length: 5
    final_max_length: 15
  stability:
    forbid_nan: true
    gradient_clip_norm: 1.0
